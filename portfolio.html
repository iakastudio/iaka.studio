  <style>
    .site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2.5rem;
      background: rgba(242,239,233,0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .portfolio-subnav {
      position: sticky;
      top: 72px;
      z-index: 999;
      display: flex;
      gap: 2rem;
      padding: 1rem 2.5rem;
      background: rgba(242,239,233,0.98);
      border-bottom: 1px solid var(--fog);
      flex-wrap: wrap;
    }
    .portfolio-subnav a {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: lowercase;
      color: var(--stone);
      transition: color 0.3s ease;
      padding-bottom: 2px;
      border-bottom: 1px solid transparent;
    }
    .portfolio-subnav a:hover,
    .portfolio-subnav a.active {
      color: var(--charcoal);
      border-bottom-color: var(--charcoal);
    }
    .portfolio-body {
      padding-top: 120px;
    }
